name: Validate site

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check Astro
        run: npm run check

      # Le build complet lit Directus et ses secrets sur le LXC de déploiement.
      # Il reste donc validé par deploy/deploy.sh, pas par GitHub Actions.
